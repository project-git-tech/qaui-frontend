<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>诊断测试</title>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 800px; margin: 0 auto; }
        .step { background: #f5f5f5; padding: 12px; margin: 10px 0; border-radius: 6px; border-left: 4px solid #7A5D38; }
        .ok { color: green; font-weight: bold; }
        .err { color: red; font-weight: bold; }
        pre { background: #eee; padding: 10px; border-radius: 4px; overflow-x: auto; font-size: 12px; }
    </style>
</head>
<body>
    <h1>subquestion.html 诊断测试</h1>
    <div id="output"></div>

    <!-- 引入配置文件 -->
    <script src="config.js"></script>

    <script>
        var out = document.getElementById('output');
        var API = window.API_BASE || '';  // 使用配置文件中的API地址
        
        function log(msg, cls) {
            out.innerHTML += '<div class="step ' + (cls||'') + '">' + msg + '</div>';
        }

        // 步骤1: 检查URL参数
        var params = new URLSearchParams(window.location.search);
        var category = params.get('category');
        log('步骤1: URL参数 → category = <b>' + (category || '(空)') + '</b>', category ? 'ok' : 'err');

        // 步骤2: 检查DOM元素
        log('步骤2: DOM元素检查 → ' + [
            document.getElementById('output') ? 'output OK' : 'output MISSING'
        ].join(' | '), 'ok');

        // 步骤3: 加载types
        log('步骤3: 正在加载 ' + API + '/api/types ...', '');
        fetch(API + '/api/types')
            .then(function(r) { return r.json(); })
            .then(function(data) {
                log('步骤3结果: types加载成功, 数量=' + data.length, 'ok');
                if (data.length > 0) {
                    log('  第一个type: id=' + data[0].id + ', name=' + data[0].name, '');
                }
                return loadQuestions();
            })
            .catch(function(e) { log('步骤3失败: ' + e.message, 'err'); });

        function loadQuestions() {
            log('步骤4: 正在加载 ' + API + '/api/questions ...', '');
            fetch(API + '/api/questions')
                .then(function(r) { return r.json(); })
                .then(function(data) {
                    log('步骤4结果: questions加载成功, 数量=' + data.length, 'ok');

                    // 步骤5: 过滤测试
                    if (category) {
                        var filtered = data.filter(function(q) {
                            return q.typeId === category && q.parentId === null;
                        });
                        log('步骤5: 过滤 typeId="' + category + '" 且 parentId=null → 匹配 <b>' + filtered.length + '</b> 条',
                            filtered.length > 0 ? 'ok' : 'err');

                        if (filtered.length > 0) {
                            var html = '<pre>';
                            filtered.forEach(function(q) {
                                html += 'ID: ' + q.id + ' | 标题: ' + q.title + ' | 类型: ' + q.attribute + '\n';
                            });
                            html += '</pre>';
                            log('匹配到的项目:', '');
                            out.innerHTML += html;
                        } else {
                            log('所有问题的typeId列表:', '');
                            var typeIds = data.map(function(q) { return q.typeId + '(' + q.title.substring(0,15) + ')'; });
                            out.innerHTML += '<pre>' + typeIds.join('\n') + '</pre>';
                        }
                    } else {
                        log('步骤5: 无category参数, 无法过滤', 'err');
                        log('提示: 请访问 diagnose.html?category=type_1781353872558 进行完整测试', '');
                    }
                })
                .catch(function(e) { log('步骤4失败: ' + e.message, 'err'); });
        }
    </script>
</body>
</html>
