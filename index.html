<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>欧派家居 - 智能客服指引 [v3-fix]</title>
    
    <!-- 性能优化：提前建立与Render API的连接 -->
    <link rel="preconnect" href="https://qa-platform-1-zat2.onrender.com">
    <link rel="dns-prefetch" href="https://qa-platform-1-zat2.onrender.com">
    
    <!-- 引入Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- 前后端分离配置 -->
    <script src="config.js"></script>

    <style>
        :root {
            /* 现代企业风格 - 颜色系统 */
            --color-primary: #3B82F6; /* Blue 500 */
            --color-primary-light: #60A5FA; /* Blue 400 */
            --color-primary-dark: #2563EB; /* Blue 600 */
            --color-secondary: #64748B; /* Slate 500 */
            --color-secondary-light: #94A3B8; /* Slate 400 */
            --color-secondary-dark: #475569; /* Slate 600 */
            --color-accent: #8B5CF6; /* Violet 500 */
            --color-accent-light: #A78BFA; /* Violet 400 */
            
            /* 背景色 */
            --color-bg-primary: #F8FAFC; /* Slate 50 */
            --color-bg-secondary: #FFFFFF;
            --color-bg-tertiary: #F1F5F9; /* Slate 100 */
            --color-bg-card: #FFFFFF;
            --color-bg-welcome: linear-gradient(135deg, #EFF6FF 0%, #DBEAFE 50%, #F8FAFC 100%);
            --color-bg-category: #FFFFFF;
            
            /* 文本色 */
            --color-text-primary: #1E293B; /* Slate 800 */
            --color-text-secondary: #475569; /* Slate 600 */
            --color-text-tertiary: #64748B; /* Slate 500 */
            
            /* 边框色 */
            --color-border: #E2E8F0; /* Slate 200 */
            --color-border-light: #F1F5F9; /* Slate 100 */
            --color-border-card: #E2E8F0; /* Slate 200 */
            
            /* 语义色 */
            --color-success: #10B981; /* Emerald 500 */
            --color-warning: #F59E0B; /* Amber 500 */
            --color-error: #EF4444; /* Red 500 */
            
            /* 统一的阴影系统 */
            --shadow-xs: 0 1px 2px rgba(0, 0, 0, 0.05);
            --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.07);
            --shadow-md: 0 4px 6px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 10px 15px rgba(0, 0, 0, 0.12);
            --shadow-xl: 0 20px 25px rgba(0, 0, 0, 0.15);
            --shadow-card: 0 2px 4px rgba(0, 0, 0, 0.08);
            
            /* 间距系统 */
            --spacing-xs: 4px;
            --spacing-sm: 8px;
            --spacing-md: 16px;
            --spacing-lg: 24px;
            --spacing-xl: 32px;
            --spacing-2xl: 48px;
            
            /* 统一的圆角系统 */
            --radius-sm: 4px;
            --radius-md: 8px;
            --radius-lg: 12px;
            --radius-xl: 16px;
            --radius-full: 9999px;
            
            /* 字体系统 */
            --font-family-base: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", sans-serif;
            --font-size-xs: 12px;
            --font-size-sm: 14px;
            --font-size-base: 16px;
            --font-size-lg: 18px;
            --font-size-xl: 24px;
            --font-size-2xl: 30px;
            --font-size-3xl: 36px;
            --font-size-4xl: 48px;
            
            /* 字体权重 */
            --font-weight-normal: 400;
            --font-weight-medium: 500;
            --font-weight-semibold: 600;
            --font-weight-bold: 700;
            
            /* 过渡动画 */
            --transition-fast: 150ms cubic-bezier(0.4, 0, 0.2, 1);
            --transition-base: 200ms cubic-bezier(0.4, 0, 0.2, 1);
            --transition-slow: 300ms cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-family-base);
            font-size: var(--font-size-base);
            color: var(--color-text-primary);
            background: var(--color-bg-primary);
            -webkit-font-smoothing: antialiased;
        }

        /* Logo */
        .logo {
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
            margin-bottom: var(--spacing-lg);
        }

        .logo-icon {
            width: 36px;
            height: 36px;
            border-radius: var(--radius-sm);
            object-fit: cover;
            box-shadow: 0 2px 8px rgba(122, 93, 56, 0.15);
        }

        .logo-text {
            font-size: var(--font-size-lg);
            font-weight: 700;
            color: var(--color-primary);
            letter-spacing: -0.2px;
        }

        /* Main Container */
        .main-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: var(--spacing-md);
            padding-top: var(--spacing-md);
        }

        /* Page Header with Logo and Admin Button */
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: var(--spacing-lg);
        }

        .page-header .logo {
            margin-bottom: 0;
        }

        .page-header .admin-btn {
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid rgba(122, 93, 56, 0.3);
            color: var(--color-primary);
        }

        .page-header .admin-btn:hover {
            background: #fff;
            border-color: var(--color-primary);
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        @media (max-width: 640px) {
            .page-header .admin-btn span {
                display: none;
            }
            .page-header .admin-btn {
                padding: 10px;
                border-radius: 50%;
            }
        }

        /* Hero Section - Combined Welcome + Search */
        .hero-section {
            background: 
                linear-gradient(135deg, #EFF6FF 0%, #E0E7FF 50%, #F8FAFC 100%);
            border-radius: var(--radius-xl);
            padding: var(--spacing-xl) var(--spacing-xl);
            margin-bottom: var(--spacing-xl);
            box-shadow: 
                0 1px 3px rgba(15, 23, 42, 0.04),
                0 10px 30px rgba(59, 130, 246, 0.08);
            color: var(--color-text-primary);
            max-width: 100%;
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(59, 130, 246, 0.1);
        }

        .hero-section::before {
            content: '';
            position: absolute;
            top: -30%;
            right: -10%;
            width: 60%;
            height: 150%;
            background: 
                radial-gradient(circle at 30% 30%, rgba(139, 92, 246, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 70% 70%, rgba(59, 130, 246, 0.06) 0%, transparent 50%);
            pointer-events: none;
        }

        .admin-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.8);
            border: 1px solid rgba(15, 23, 42, 0.1);
            border-radius: var(--radius-full);
            font-size: var(--font-size-sm);
            color: var(--color-text-secondary);
            cursor: pointer;
            transition: all var(--transition-fast);
            text-decoration: none;
            margin-left: 8px;
            backdrop-filter: blur(8px);
        }

        .admin-btn:hover {
            background: white;
            border-color: var(--color-primary);
            color: var(--color-primary);
            transform: translateY(-1px);
            box-shadow: 0 2px 8px rgba(59, 130, 246, 0.15);
        }

        .admin-btn:active {
            transform: translateY(0);
            background: rgba(255, 255, 255, 0.3);
        }

        .admin-btn i {
            font-size: 16px;
        }

        /* Responsive admin button */
        @media (max-width: 640px) {
            .admin-btn span {
                display: none;
            }
            .admin-btn {
                padding: 8px 12px;
                border-radius: 50%;
            }
        }

        .hero-welcome {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            margin-bottom: var(--spacing-lg);
            position: relative;
            z-index: 1;
        }

        .welcome-greeting {
            font-size: var(--font-size-2xl);
            font-weight: 700;
            margin-bottom: var(--spacing-sm);
            letter-spacing: -0.3px;
            background: linear-gradient(135deg, #1E293B 0%, #3B82F6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .welcome-guide {
            font-size: var(--font-size-sm);
            color: var(--color-text-secondary);
            font-weight: 400;
        }

        /* Search Section */
        .search-container {
            position: relative;
            max-width: 640px;
            margin: 0 auto;
            z-index: 1;
        }

        .search-input {
            width: 100%;
            padding: 14px 20px;
            padding-left: 52px;
            border: 1px solid rgba(15, 23, 42, 0.08);
            border-radius: var(--radius-xl);
            font-size: var(--font-size-base);
            background: white;
            transition: all var(--transition-base);
            color: var(--color-text-primary);
            box-shadow: 
                0 2px 4px rgba(15, 23, 42, 0.03),
                0 12px 24px rgba(59, 130, 246, 0.06);
        }

        .search-input:focus {
            outline: none;
            border-color: var(--color-primary);
            box-shadow: 
                0 0 0 4px rgba(59, 130, 246, 0.1),
                0 2px 4px rgba(15, 23, 42, 0.03),
                0 12px 24px rgba(59, 130, 246, 0.08);
            transform: translateY(-1px);
        }

        .search-input::placeholder {
            color: var(--color-text-tertiary);
        }

        .search-icon {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            width: 20px;
            height: 20px;
            color: var(--color-text-tertiary);
            transition: all var(--transition-fast);
        }

        .search-input:focus + .search-icon {
            color: var(--color-primary);
            transform: translateY(-50%) scale(1.1);
        }

        /* Hot Questions in Hero */
        .hero-hot-questions {
            margin-top: var(--spacing-lg);
            padding-top: var(--spacing-md);
            border-top: 1px solid rgba(15, 23, 42, 0.06);
            position: relative;
            z-index: 1;
        }

        .hero-hot-row {
            display: flex;
            flex-wrap: wrap;
            gap: var(--spacing-sm);
            justify-content: center;
            align-items: center;
        }

        .hero-hot-title {
            font-size: var(--font-size-xs);
            font-weight: 500;
            color: var(--color-text-tertiary);
            margin-right: var(--spacing-xs);
        }

        .hero-hot-tag {
            display: inline-flex;
            align-items: center;
            gap: var(--spacing-xs);
            padding: 6px 14px;
            background: white;
            border: 1px solid rgba(59, 130, 246, 0.15);
            border-radius: var(--radius-full);
            font-size: var(--font-size-xs);
            color: var(--color-text-secondary);
            cursor: pointer;
            transition: all var(--transition-fast);
            font-weight: 400;
        }

        .hero-hot-tag:hover {
            background: var(--color-primary);
            border-color: var(--color-primary);
            color: white;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.25);
        }

        /* Legacy classes kept for JS compatibility */
        .search-section {
            display: none;
        }

        .hot-question-tag:hover {
            background: rgba(122, 93, 56, 0.1);
            border-color: var(--color-primary);
            color: var(--color-primary);
        }

        .hot-question-tag svg {
            width: 12px;
            height: 12px;
        }

        /* Progress Section - Removed */
        .progress-section {
            display: none;
        }

        /* Search Results Section */
        .search-results-section {
            background: var(--color-bg-card);
            border-radius: var(--radius-xl);
            padding: var(--spacing-xl);
            box-shadow: var(--shadow-card);
            border: 1px solid var(--color-border);
            margin-bottom: var(--spacing-xl);
        }

        .search-results-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: var(--spacing-lg);
            padding-bottom: var(--spacing-md);
            border-bottom: 1px solid var(--color-border);
        }

        .search-results-title {
            font-size: var(--font-size-xl);
            font-weight: 600;
            color: var(--color-text-primary);
        }

        .search-results-count {
            font-size: var(--font-size-sm);
            color: var(--color-text-tertiary);
        }

        .search-results-list {
            display: flex;
            flex-direction: column;
            gap: var(--spacing-md);
        }

        .search-result-item {
            display: flex;
            align-items: center;
            gap: var(--spacing-md);
            padding: var(--spacing-lg);
            background: var(--color-bg-tertiary);
            border-radius: var(--radius-md);
            text-decoration: none;
            color: inherit;
            transition: all var(--transition-base);
            border: 1px solid transparent;
        }

        .search-result-item:hover {
            background: var(--color-bg-secondary);
            border-color: var(--color-primary);
            box-shadow: var(--shadow-sm);
            transform: translateX(4px);
        }

        .search-result-icon {
            width: 44px;
            height: 44px;
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .search-result-icon svg {
            width: 20px;
            height: 20px;
            color: var(--color-primary);
        }

        .search-result-content {
            flex: 1;
            min-width: 0;
        }

        .search-result-title {
            font-size: var(--font-size-base);
            font-weight: 500;
            color: var(--color-text-primary);
            margin-bottom: var(--spacing-xs);
        }

        .search-result-desc {
            font-size: var(--font-size-sm);
            color: var(--color-text-secondary);
            margin-bottom: var(--spacing-xs);
        }

        .search-result-type {
            font-size: var(--font-size-xs);
            font-weight: 500;
        }

        .search-result-arrow {
            width: 20px;
            height: 20px;
            color: var(--color-text-tertiary);
            flex-shrink: 0;
            transition: all var(--transition-fast);
        }

        .search-result-item:hover .search-result-arrow {
            color: var(--color-primary);
            transform: translateX(4px);
        }

        .progress-connector {
            width: 48px;
            height: 2px;
            background: var(--color-border);
            margin-top: 14px;
            flex-shrink: 0;
        }

        .progress-connector.completed {
            background: var(--color-success);
        }

        /* Category Section */
        .category-section {
            margin-bottom: var(--spacing-xl);
        }

        .section-title {
            font-size: var(--font-size-lg);
            font-weight: 600;
            color: var(--color-text-primary);
            margin-bottom: var(--spacing-sm);
            text-align: center;
            letter-spacing: -0.2px;
        }

        .section-subtitle {
            font-size: var(--font-size-sm);
            color: var(--color-text-secondary);
            text-align: center;
            margin-bottom: var(--spacing-lg);
            font-weight: 400;
        }

        .category-section {
            background: transparent;
            border-radius: 0;
            padding: 0;
            box-shadow: none;
            border: none;
        }

        .category-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: var(--spacing-md);
        }

        .category-card {
            background: var(--color-bg-card);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-lg);
            padding: var(--spacing-xl) var(--spacing-lg);
            cursor: pointer;
            transition: all var(--transition-base);
            text-align: center;
            min-height: 180px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            box-shadow: 0 1px 3px rgba(15, 23, 42, 0.04);
        }

        .category-link {
            display: block;
            text-decoration: none;
            color: inherit;
        }

        .category-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--color-primary), var(--color-accent));
            transform: scaleX(0);
            transform-origin: center;
            transition: transform var(--transition-base);
            border-radius: var(--radius-lg) var(--radius-lg) 0 0;
        }

        .category-card:hover {
            border-color: rgba(59, 130, 246, 0.3);
            box-shadow: 
                0 4px 12px rgba(59, 130, 246, 0.12),
                0 1px 3px rgba(15, 23, 42, 0.06);
            transform: translateY(-3px);
            background: #FFFFFF;
        }

        .category-card:hover::before {
            transform: scaleX(1);
        }

        .category-icon {
            width: 56px;
            height: 56px;
            margin-bottom: var(--spacing-md);
            border-radius: var(--radius-lg);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all var(--transition-base);
        }

        .category-card:hover .category-icon {
            transform: scale(1.08);
        }

        .category-icon svg {
            width: 26px;
            height: 26px;
        }

        .category-title {
            font-size: var(--font-size-base);
            font-weight: 600;
            color: var(--color-text-primary);
            margin-bottom: var(--spacing-xs);
            letter-spacing: -0.1px;
        }

        .category-description {
            font-size: var(--font-size-xs);
            color: var(--color-text-tertiary);
            line-height: 1.6;
            margin-bottom: var(--spacing-sm);
        }

        .category-count {
            display: inline-flex;
            align-items: center;
            gap: var(--spacing-xs);
            font-size: var(--font-size-xs);
            color: var(--color-primary);
            background: rgba(59, 130, 246, 0.08);
            padding: 4px 12px;
            border-radius: var(--radius-full);
            font-weight: 500;
        }

        /* ========== Skeleton Loading ========== */
        @keyframes skeleton-pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .skeleton-card {
            background: var(--color-bg-tertiary);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-md);
            padding: var(--spacing-lg);
            text-align: center;
            min-height: 160px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: var(--spacing-md);
        }

        .skeleton-icon {
            width: 52px;
            height: 52px;
            border-radius: var(--radius-lg);
            background: linear-gradient(135deg, #e5e7eb, #d1d5db);
            animation: skeleton-pulse 1.5s ease-in-out infinite;
        }

        .skeleton-line {
            height: 16px;
            border-radius: 4px;
            background: linear-gradient(90deg, #e5e7eb, #d1d5db, #e5e7eb);
            background-size: 200% 100%;
            animation: skeleton-pulse 1.5s ease-in-out infinite;
        }

        .skeleton-line.title {
            width: 60%;
            height: 18px;
        }

        .skeleton-line.desc {
            width: 85%;
            height: 14px;
        }

        .skeleton-line.short {
            width: 40%;
            height: 14px;
        }

        #categoryGrid.loading .skeleton-card,
        #categoryGrid:empty + .skeleton-container .skeleton-card {
            display: flex;
        }

        /* Loading overlay on hero section */
        .loading-indicator {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 8px 0;
            font-size: var(--font-size-sm);
            color: var(--color-text-tertiary);
        }

        .loading-indicator .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--color-primary);
            animation: dot-bounce 1.2s ease-in-out infinite;
        }

        .loading-indicator .dot:nth-child(2) { animation-delay: 0.15s; }
        .loading-indicator .dot:nth-child(3) { animation-delay: 0.3s; }

        @keyframes dot-bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }

        /* Subquestion Section */
        .subquestion-section, .solution-section {
            display: none;
        }

        .subquestion-section.visible, .solution-section.visible {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .breadcrumb {
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
            margin-bottom: var(--spacing-xl);
            font-size: var(--font-size-sm);
        }

        .breadcrumb-item {
            color: var(--color-text-tertiary);
            text-decoration: none;
            cursor: pointer;
        }

        .breadcrumb-item:hover {
            color: var(--color-primary);
        }

        .breadcrumb-item.active {
            color: var(--color-text-primary);
            font-weight: 500;
        }

        .breadcrumb-separator {
            color: var(--color-text-tertiary);
        }

        .subquestion-list {
            display: flex;
            flex-direction: column;
            gap: var(--spacing-md);
        }

        .subquestion-item {
            background: var(--color-bg-card);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-md);
            padding: var(--spacing-lg);
            cursor: pointer;
            transition: all var(--transition-base);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .subquestion-item:hover {
            border-color: var(--color-primary);
            box-shadow: var(--shadow-sm);
            background: rgba(122, 93, 56, 0.02);
        }

        .subquestion-item.selected {
            border-color: var(--color-primary);
            background: rgba(122, 93, 56, 0.04);
        }

        .subquestion-content {
            flex: 1;
            min-width: 0;
        }

        .subquestion-title {
            font-size: var(--font-size-base);
            font-weight: 500;
            color: var(--color-text-primary);
            margin-bottom: var(--spacing-xs);
        }

        .subquestion-meta {
            font-size: var(--font-size-xs);
            color: var(--color-text-tertiary);
        }

        .subquestion-arrow {
            width: 20px;
            height: 20px;
            color: var(--color-text-tertiary);
            transition: all var(--transition-fast);
            flex-shrink: 0;
        }

        .subquestion-item:hover .subquestion-arrow {
            color: var(--color-primary);
            transform: translateX(4px);
        }

        /* Solution Section */
        .solution-card {
            background: var(--color-bg-card);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-md);
            overflow: hidden;
            border: 1px solid var(--color-border);
        }

        .solution-header {
            background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-primary-dark) 100%);
            color: white;
            padding: var(--spacing-xl);
        }

        .solution-badge {
            display: inline-flex;
            align-items: center;
            gap: var(--spacing-xs);
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(4px);
            padding: var(--spacing-xs) var(--spacing-md);
            border-radius: var(--radius-full);
            font-size: var(--font-size-xs);
            font-weight: 500;
            margin-bottom: var(--spacing-md);
        }

        .solution-title {
            font-size: var(--font-size-xl);
            font-weight: 600;
            margin-bottom: var(--spacing-sm);
            letter-spacing: -0.3px;
        }

        .solution-subtitle {
            font-size: var(--font-size-sm);
            opacity: 0.9;
            font-weight: 400;
        }

        .solution-body {
            padding: var(--spacing-xl);
        }

        .solution-steps {
            display: flex;
            flex-direction: column;
            gap: var(--spacing-xl);
        }

        .solution-step {
            display: flex;
            gap: var(--spacing-md);
            padding-bottom: var(--spacing-xl);
            border-bottom: 1px solid var(--color-border-light);
        }

        .solution-step:last-child {
            padding-bottom: 0;
            border-bottom: none;
        }

        .step-number {
            width: 28px;
            height: 28px;
            flex-shrink: 0;
            background: linear-gradient(135deg, var(--color-primary), var(--color-primary-dark));
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: var(--font-size-xs);
            box-shadow: var(--shadow-sm);
        }

        .step-content {
            flex: 1;
        }

        .step-title {
            font-weight: 600;
            color: var(--color-text-primary);
            margin-bottom: var(--spacing-xs);
            font-size: var(--font-size-base);
        }

        .step-description {
            font-size: var(--font-size-sm);
            color: var(--color-text-secondary);
            line-height: 1.7;
        }

        .solution-note {
            background: linear-gradient(135deg, rgba(212, 175, 55, 0.08), rgba(122, 93, 56, 0.06));
            border-left: 3px solid var(--color-accent);
            padding: var(--spacing-md) var(--spacing-lg);
            margin-top: var(--spacing-lg);
            border-radius: 0 var(--radius-md) var(--radius-md) 0;
        }

        .solution-note-title {
            font-weight: 600;
            color: var(--color-primary-dark);
            margin-bottom: var(--spacing-xs);
            font-size: var(--font-size-sm);
        }

        .solution-note-text {
            font-size: var(--font-size-sm);
            color: var(--color-text-secondary);
        }

        .action-buttons {
            display: flex;
            gap: var(--spacing-md);
            margin-top: var(--spacing-xl);
            padding-top: var(--spacing-xl);
            border-top: 1px solid var(--color-border);
        }

        .btn {
            padding: var(--spacing-md) var(--spacing-xl);
            border-radius: var(--radius-lg);
            font-size: var(--font-size-base);
            font-weight: 500;
            cursor: pointer;
            transition: all var(--transition-base);
            border: none;
            display: inline-flex;
            align-items: center;
            gap: var(--spacing-sm);
            position: relative;
            overflow: hidden;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-primary-dark) 100%);
            color: white;
            box-shadow: var(--shadow-sm);
        }

        .btn-primary:hover {
            background: linear-gradient(135deg, var(--color-primary-light) 0%, var(--color-primary) 100%);
            box-shadow: var(--shadow-md);
            transform: translateY(-2px);
        }

        .btn-primary:active {
            transform: translateY(0) scale(0.98);
            box-shadow: var(--shadow-xs);
        }

        .btn-secondary {
            background: var(--color-bg-card);
            color: var(--color-text-primary);
            border: 1px solid var(--color-border);
        }

        .btn-secondary:hover {
            background: var(--color-bg-secondary);
            border-color: var(--color-primary);
            color: var(--color-primary);
            transform: translateY(-1px);
        }

        .btn-secondary:active {
            transform: translateY(0) scale(0.98);
        }

        .btn-icon {
            width: 18px;
            height: 18px;
        }

        @media (max-width: 768px) {
            .main-container {
                padding: var(--spacing-md);
            }

            .progress-container {
                flex-direction: column;
                gap: var(--spacing-xs);
            }
            
            .progress-connector {
                width: 2px;
                height: 20px;
                margin-top: 0;
            }

            .action-buttons {
                flex-direction: column;
                gap: var(--spacing-md);
            }

            .btn {
                width: 100%;
                justify-content: center;
            }

            .category-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: var(--spacing-sm);
            }

            .category-card {
                min-height: 140px;
                padding: var(--spacing-md);
            }

            .category-icon {
                width: 44px;
                height: 44px;
            }

            .category-icon svg {
                width: 24px;
                height: 24px;
            }

            .logo-icon {
                width: 40px;
                height: 40px;
                font-size: var(--font-size-lg);
            }

            .logo-text {
                font-size: var(--font-size-xl);
            }

            .welcome-title {
                font-size: var(--font-size-xl);
            }

            .section-title::before,
            .section-title::after {
                width: 16px;
            }
        }

        @media (max-width: 480px) {
            .category-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

    <script>
        // ========== 数据存储模块 ==========
        const DataStore = {
            questionTypes: [],
            questions: [],
            hotQuestions: [],
            
            async load() {
                const DATA = window.DATA_BASE || './data';  // 静态数据路径

                try {
                    const [typesRes, questionsRes, hotRes] = await Promise.all([
                        fetch(DATA + '/types.json'),
                        fetch(DATA + '/questions.json'),
                        fetch(DATA + '/hot.json')
                    ]);

                    // 检查是否有请求失败
                    const allOk = typesRes.ok && questionsRes.ok && hotRes.ok;
                    if (!allOk) {
                        throw new Error('部分静态数据文件加载失败');
                    }

                    this.questionTypes = await typesRes.json() || [];
                    this.questions = await questionsRes.json() || [];
                    this.hotQuestions = await hotRes.json() || [];

                    console.log('[DataStore] 静态数据加载成功', {
                        types: this.questionTypes.length,
                        questions: this.questions.length,
                        hot: this.hotQuestions.length
                    });

                } catch (error) {
                    console.error('[DataStore] 数据加载失败:', error.message);

                    // 静态文件加载失败，使用空数据
                    this.questionTypes = [];
                    this.questions = [];
                    this.hotQuestions = [];
                }
            },
            getQuestionTypes() { return this.questionTypes; },
            getHotQuestions() { return this.hotQuestions; },
            search(keyword) {
                if (!keyword.trim()) return [];
                
                const lowerKeyword = keyword.toLowerCase();
                const results = [];
                
                // 搜索问题类型
                this.questionTypes.forEach(type => {
                    if (type.name.toLowerCase().includes(lowerKeyword) ||
                        (type.description && type.description.toLowerCase().includes(lowerKeyword))) {
                        results.push({
                            type: 'category',
                            id: type.id,
                            title: type.name,
                            description: type.description || '点击查看详情',
                            url: `subquestion.html?category=${encodeURIComponent(type.id)}`
                        });
                    }
                });
                
                // 搜索问题（目录和文章）
                this.questions.forEach(question => {
                    const matchTitle = question.title.toLowerCase().includes(lowerKeyword);
                    const matchContent = question.content && question.content.toLowerCase().includes(lowerKeyword);
                    
                    if (matchTitle || matchContent) {
                        const typeName = this.questionTypes.find(t => t.id === question.typeId)?.name || '未知类型';
                        results.push({
                            type: question.attribute,
                            id: question.id,
                            typeId: question.typeId,
                            title: question.title,
                            description: question.attribute === 'directory' ? '点击进入目录' : '点击查看文章',
                            parentId: question.parentId,
                            url: question.attribute === 'directory' 
                                ? `subquestion.html?category=${encodeURIComponent(question.typeId)}&path=${question.id}`
                                : `solution.html?category=${encodeURIComponent(question.typeId)}&question=${question.id}`,
                            typeName: typeName
                        });
                    }
                });
                
                return results;
            }
        };

        // 根据类别名称匹配图标和配色 - 关键词智能匹配
        function getCategoryIconAndColor(name) {
            const n = (name || '').toLowerCase();
            // 关键词 → (图标key, 渐变色)
            const rules = [
                { keys: ['产品', '咨询', '信息', '规格', '材质', '说明'], icon: 'question', colors: ['#3B82F6', '#8B5CF6'] },
                { keys: ['售后', '维修', '保修', '服务', '处理'], icon: 'wrench', colors: ['#10B981', '#3B82F6'] },
                { keys: ['订单', '购买', '下单', '购物', '数量', '单据'], icon: 'bag', colors: ['#F59E0B', '#3B82F6'] },
                { keys: ['物流', '配送', '发货', '快递', '运输', '包裹'], icon: 'truck', colors: ['#3B82F6', '#06B6D4'] },
                { keys: ['安装', '预约', '上门', '安排', '时间'], icon: 'clock', colors: ['#8B5CF6', '#EC4899'] },
                { keys: ['保养', '维护', '清洗', '保护'], icon: 'heart', colors: ['#EC4899', '#F43F5E'] },
                { keys: ['退换', '退货', '退款', '换货', '更换', '返回'], icon: 'refresh', colors: ['#F59E0B', '#EF4444'] },
                { keys: ['价格', '优惠', '折扣', '价钱', '促销', '活动'], icon: 'tag', colors: ['#F97316', '#F59E0B'] },
                { keys: ['客服', '联系', '电话', '咨询', '反馈', '投诉'], icon: 'phone', colors: ['#06B6D4', '#3B82F6'] },
                { keys: ['支付', '付款', '金额', '费用', '发票', '报销'], icon: 'money', colors: ['#10B981', '#8B5CF6'] },
                { keys: ['目录', '分类', '列表'], icon: 'folder', colors: ['#8B5CF6', '#6366F1'] },
                { keys: ['文章', '文档', '指南'], icon: 'file', colors: ['#475569', '#3B82F6'] }
            ];
            for (const rule of rules) {
                if (rule.keys.some(k => n.includes(k))) {
                    return { icon: rule.icon, colors: rule.colors };
                }
            }
            return { icon: 'file', colors: ['#64748B', '#3B82F6'] };
        }

        // 根据问题内容匹配图标和配色 - 用于子问题/文章列表
        function getQuestionIconAndColor(title, isDir) {
            const t = (title || '').toLowerCase();
            // 目录类用folder，文章类根据标题关键词匹配
            if (isDir) {
                return { icon: 'folder', colors: ['#8B5CF6', '#6366F1'] };
            }
            const rules = [
                { keys: ['订单', '购买', '下单', '购物', '单据'], icon: 'bag', colors: ['#F59E0B', '#3B82F6'] },
                { keys: ['退款', '退货', '换货', '退换', '更换', '返回'], icon: 'refresh', colors: ['#F59E0B', '#EF4444'] },
                { keys: ['保修', '维修', '售后', '处理'], icon: 'wrench', colors: ['#10B981', '#3B82F6'] },
                { keys: ['物流', '配送', '发货', '快递', '运输', '包裹'], icon: 'package', colors: ['#3B82F6', '#06B6D4'] },
                { keys: ['安装', '预约', '上门', '时间', '安排'], icon: 'clock', colors: ['#8B5CF6', '#EC4899'] },
                { keys: ['产品', '规格', '材质', '说明', '信息', '咨询'], icon: 'question', colors: ['#3B82F6', '#8B5CF6'] },
                { keys: ['价格', '优惠', '折扣', '价钱', '促销', '活动'], icon: 'tag', colors: ['#F97316', '#F59E0B'] },
                { keys: ['支付', '付款', '金额', '费用'], icon: 'money', colors: ['#10B981', '#8B5CF6'] },
                { keys: ['客服', '联系', '电话', '反馈', '投诉'], icon: 'phone', colors: ['#06B6D4', '#3B82F6'] },
                { keys: ['保养', '维护', '清洗', '保护'], icon: 'heart', colors: ['#EC4899', '#F43F5E'] },
                { keys: ['链接', '外部', '网址', '访问'], icon: 'link', colors: ['#6366F1', '#8B5CF6'] }
            ];
            for (const rule of rules) {
                if (rule.keys.some(k => t.includes(k))) {
                    return { icon: rule.icon, colors: rule.colors };
                }
            }
            return { icon: 'file', colors: ['#475569', '#3B82F6'] };
        }

        // 兼容旧的图标映射
        const categoryIcons = {
            'ri-home-line': richIconLibrary.home,
            'ri-service-line': richIconLibrary.wrench,
            'ri-file-text-line': richIconLibrary.file,
            'ri-truck-line': richIconLibrary.truck,
            'ri-money-cny-circle-line': richIconLibrary.money,
            'ri-customer-service-line': richIconLibrary.phone
        };

        // ============================================
        // Dynamic Data Loading Functions
        // ============================================
        function loadCategories() {
            const grid = document.getElementById('categoryGrid');
            const types = DataStore.getQuestionTypes().filter(t => t.status);

            if (types.length === 0) {
                grid.innerHTML = `<div class="empty-state">
                    <p style="color:var(--color-text-tertiary);padding:40px;text-align:center;">
                        数据加载失败，请<a href="javascript:refreshAllData()" style="color:var(--color-primary);text-decoration:underline;">点击重试</a>
                    </p>
                </div>`;
                return;
            }

            grid.innerHTML = types.map(type => {
                // 优先根据类别名称智能匹配图标和配色
                const smart = getCategoryIconAndColor(type.name);
                const iconPath = categoryIcons[type.icon] || richIconLibrary[smart.icon] || richIconLibrary.file;
                const gradientColor = `linear-gradient(135deg, ${smart.colors[0]}1A 0%, ${smart.colors[1]}1A 100%)`;
                const hoverGradient = `linear-gradient(135deg, ${smart.colors[0]}29 0%, ${smart.colors[1]}29 100%)`;
                const strokeColor = smart.colors[0];
                const description = type.description || `点击查看${type.name}相关问题`;
                return `
                    <a href="subquestion.html?category=${encodeURIComponent(type.id)}" class="category-card-link" style="text-decoration:none;color:inherit;display:block;">
                        <div class="category-card" data-type-id="${type.id}">
                            <div class="category-icon" style="background:${gradientColor};" data-hover="${hoverGradient}" data-stroke="${strokeColor}">
                                <svg viewBox="0 0 24 24" fill="none" stroke="${strokeColor}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    ${iconPath}
                                </svg>
                            </div>
                            <h3 class="category-title">${type.name}</h3>
                            <p class="category-description">${description}</p>
                        </div>
                    </a>
                `;
            }).join('');
        }

        function loadHotQuestions() {
            const container = document.querySelector('.hero-hot-row');
            const hotQuestions = DataStore.getHotQuestions().filter(h => h.status);

            if (hotQuestions.length === 0) {
                container.innerHTML = '<span class="hero-hot-title">热门问题：</span><span style="color:rgba(255,255,255,0.6);font-size:var(--font-size-sm);">暂无热门问题</span>';
                return;
            }

            // Sort by order
            hotQuestions.sort((a, b) => a.order - b.order);

            container.innerHTML = '<span class="hero-hot-title">热门问题：</span>' +
                hotQuestions.map(h => `<button class="hero-hot-tag" data-title="${h.title}">${h.title}</button>`).join('');
        }

        // ============================================
        // Search Functions
        // ============================================
        function performSearch(keyword) {
            const results = DataStore.search(keyword);
            const resultsSection = document.getElementById('searchResultsSection');
            const resultsList = document.getElementById('searchResultsList');
            const resultsCount = document.getElementById('searchResultsCount');
            const categorySection = document.getElementById('categorySection');

            if (!keyword.trim()) {
                resultsSection.style.display = 'none';
                categorySection.style.display = 'block';
                return;
            }

            if (results.length === 0) {
                resultsList.innerHTML = `
                    <div style="text-align:center;padding:40px;">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:48px;height:48px;color:var(--color-text-tertiary);margin-bottom:16px;">
                            <circle cx="11" cy="11" r="8"/>
                            <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                        </svg>
                        <p style="color:var(--color-text-tertiary);">未找到相关结果</p>
                        <p style="color:var(--color-text-tertiary);font-size:14px;margin-top:8px;">请尝试其他关键词</p>
                    </div>
                `;
            } else {
                resultsList.innerHTML = results.map(item => {
                    const icon = item.type === 'category' 
                        ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>'
                        : (item.type === 'directory' 
                            ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>'
                            : '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>');
                    
                    const typeLabel = item.type === 'category' ? '分类' : (item.type === 'directory' ? '目录' : '文章');
                    const typeColor = item.type === 'category' ? 'var(--color-primary)' : (item.type === 'directory' ? '#F59E0B' : 'var(--color-success)');

                    return `
                        <a href="${item.url}" class="search-result-item">
                            <div class="search-result-icon" style="background:${typeColor};opacity:0.1;">${icon}</div>
                            <div class="search-result-content">
                                <h4 class="search-result-title">${item.title}</h4>
                                <p class="search-result-desc">${item.description}</p>
                                ${item.typeName ? `<span class="search-result-type" style="color:${typeColor}">${typeLabel} · ${item.typeName}</span>` : `<span class="search-result-type" style="color:${typeColor}">${typeLabel}</span>`}
                            </div>
                            <svg class="search-result-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <polyline points="9 18 15 12 9 6"/>
                            </svg>
                        </a>
                    `;
                }).join('');
            }

            resultsCount.textContent = `共找到 ${results.length} 个结果`;
            resultsSection.style.display = 'block';
            categorySection.style.display = 'none';
        }

        // ============================================
        // Real-time Data Synchronization
        // ============================================
        async function refreshAllData() {
            const indicator = document.getElementById('pageLoading');
            const grid = document.getElementById('categoryGrid');
            
            // 显示加载状态
            if (indicator) indicator.style.display = 'flex';
            
            try {
                await DataStore.load();
            } finally {
                // 隐藏加载状态
                if (indicator) indicator.style.display = 'none';
            }
            
            loadCategories();
            loadHotQuestions();
        }

        // ============================================
        // Event Listeners
        // ============================================
        
        // Listen for storage changes from other tabs/windows (admin.html)
        window.addEventListener('storage', function(e) {
            if (e.key === 'qaui_admin_data') {
                console.log('检测到后台数据更新，刷新展示数据...');
                refreshAllData();
            }
        });

        // Listen for custom dataUpdated event from same-tab (admin.html)
        window.addEventListener('dataUpdated', function(e) {
            console.log('检测到数据更新，刷新展示数据...');
            refreshAllData();
        });

        // Category icon hover effects - 动态背景色变化
        function setupCategoryHover() {
            const cards = document.querySelectorAll('.category-card');
            cards.forEach(card => {
                const icon = card.querySelector('.category-icon');
                if (!icon) return;
                const originalBg = icon.style.background;
                const hoverBg = icon.dataset.hover;
                const strokeColor = icon.dataset.stroke;
                const svg = icon.querySelector('svg');
                const originalStroke = svg ? svg.getAttribute('stroke') : strokeColor;
                
                card.addEventListener('mouseenter', function() {
                    if (hoverBg) icon.style.background = hoverBg;
                });
                card.addEventListener('mouseleave', function() {
                    icon.style.background = originalBg;
                });
            });
        }

        // 在数据加载后调用 setupCategoryHover
        const originalRefresh = refreshAllData;
        refreshAllData = async function() {
            await originalRefresh();
            setupCategoryHover();
        };

        // Search input event
        const searchInput = document.getElementById('searchInput');
        searchInput.addEventListener('input', function(e) {
            performSearch(e.target.value);
        });

        searchInput.addEventListener('keyup', function(e) {
            if (e.key === 'Enter') {
                performSearch(e.target.value);
            }
        });

        // Hot question tag click - fill to search and search
        document.addEventListener('click', function(e) {
            const hotTag = e.target.closest('.hero-hot-tag');
            if (hotTag) {
                const title = hotTag.dataset.title || hotTag.textContent;
                searchInput.value = title;
                DataStore.load().then(() => {
                    performSearch(title);
                });
            }
        });

        // Clear search button
        document.getElementById('clearSearchBtn').addEventListener('click', function() {
            searchInput.value = '';
            performSearch('');
            searchInput.focus();
        });

        // ========== 初始化 ==========
        document.addEventListener('DOMContentLoaded', function() {
            refreshAllData();
        });


    </script>
</body>
</html>
